<!DOCTYPE html>
<html lang="zh-TW">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 引入 Tailwind CSS (用於排版與顏色) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Lucide 圖示庫 -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- 引入 React 核心庫 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 來讓瀏覽器看得懂 JSX 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <!-- React 應用程式會渲染在這個 div 裡面 -->
  <div id="root"></div>

      { name: '蕭安淇', score: 70, light: 'green', type: '非新會員',

    const Icon = ({ name, size = 20, className = "" }) => {
      return <i data-lucide={name} style={{ width: size, height: size, display: 'inline-block' }} className={className}></i>;
    };

    const LightTag = ({ light }) => {
      const colors = {
        green: 'bg-emerald-100 text-emerald-700 border-emerald-200',
        yellow: 'bg-amber-100 text-amber-700 border-amber-200',
        red: 'bg-rose-100 text-rose-700 border-rose-200',
        gray: 'bg-gray-100 text-gray-700 border-gray-200'
      };
      const labels = { green: '🟢 綠燈', yellow: '🟡 黃燈', red: '🔴 紅燈', gray: '⚫ 黑燈' };
      return (
        <span className={`px-2.5 py-1 text-xs font-semibold rounded-full border ${colors[light]}`}>
          {labels[light]}
        </span>
      );
    };

    // --- 主畫面 ---

      useEffect(() => {
        lucide.createIcons();

              </div>
            </div>
          </header>

              </div>
              <div>
                <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">

                  <strong>本期無觸發。</strong> 全體會員等效缺席均 ≤ 3 次，替代人次數均 &lt; 7 次，基本出席紀律良好。

              </div>
            </div>

                <Icon name="target" className="text-slate-500" size={20} /> 燈號分佈概況
              </h2>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                {summaryData.map((item, idx) => (

                    <div className="flex justify-between items-center mb-2">
                      <span className="text-sm font-semibold text-slate-500 flex items-center gap-1">

                    <div className="text-right text-xs font-bold text-slate-400 mt-1">{item.percent}%</div>

              </p>
              <div className="bg-white rounded-lg p-4 border border-rose-100">

                  <li className="flex items-center gap-2 text-sm text-slate-600"><Icon name="trending-down" size={16} className="text-rose-500"/> <strong>楊秉諺：</strong>78筆引薦 / 交易量極低</li>
                  <li className="flex items-center gap-2 text-sm text-slate-600"><Icon name="trending-down" size={16} className="text-rose-500"/> <strong>邱德晏：</strong>38筆引薦 / 交易 0 元</li>
                  <li className="flex items-center gap-2 text-sm text-slate-600"><Icon name="trending-down" size={16} className="text-rose-500"/> <strong>馬鼎鈞：</strong>65筆引薦 / 交易額不成比例</li>
                </ul>
              </div>
            </section>

            {/* 兩欄式佈局 */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
              
              {/* 左欄：互動三角 */}

                  <Icon name="users" className="text-indigo-500" size={20} /> 互動三角典型案例
                </h2>
                
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                  <h3 className="text-md font-bold text-indigo-700 border-b border-indigo-100 pb-2 mb-3 flex justify-between items-center">
                    <span>模式 B (吃老本 / Taker)</span>

                <div className="grid gap-3">
                  {greenIdling.map((item, idx) => (
                    <div key={idx} className="bg-white border border-emerald-100 shadow-sm rounded-lg p-4 flex gap-4 items-start">

              </section>

            </div>

            {/* 行為異常診斷 - 最需關注個案 */}

              <div className="flex items-center justify-between mb-4">
                <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">

                </h2>
              </div>
              
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                {anomalies.map((member, idx) =>
